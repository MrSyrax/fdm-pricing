<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin's 3D Lab - FDM Price Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-8">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden">

        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-8">
            <h1 class="text-4xl font-bold">Kevin's 3D Lab</h1>
            <p class="text-blue-100 mt-1">FDM Print Price Calculator</p>
        </div>

        <!-- Calculator -->
        <div class="p-8 space-y-8">

            <!-- Product Name -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Product Name</label>
                <input id="product" type="text" placeholder="e.g. Custom Dragon Figurine"
                       class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg">
            </div>

            <!-- Print Plates -->
            <div>
                <div class="flex justify-between items-center mb-3">
                    <label class="block text-sm font-medium text-gray-700">Print Plates</label>
                    <button onclick="addPlate()" class="text-sm px-3 py-1 bg-blue-100 hover:bg-blue-200 text-blue-700 rounded-xl font-medium">+ Add Plate</button>
                </div>
                <div id="plates-container" class="space-y-3"></div>
            </div>

            <!-- Cost Breakdown -->
            <div class="bg-gray-50 p-5 rounded-2xl space-y-2 text-sm">
                <div class="flex justify-between"><span class="text-gray-600">Filament Cost:</span><span id="filament-display" class="font-medium">$0.00</span></div>
                <div class="flex justify-between"><span class="text-gray-600">Print Time Cost:</span><span id="time-display" class="font-medium">$0.00</span></div>
                <div class="pt-2 border-t border-gray-300 flex justify-between font-semibold">
                    <span>Subtotal (before markup):</span>
                    <span id="subtotal" class="text-blue-600">$0.00</span>
                </div>
            </div>

            <!-- Markup -->
            <div class="bg-emerald-50 p-5 rounded-2xl flex justify-between items-center">
                <div>
                    <span class="font-bold text-emerald-800">250% Markup</span>
                    <div class="text-xs text-emerald-600">(x2.5 on materials + time)</div>
                </div>
                <div id="markup-display" class="text-2xl font-bold text-emerald-700">$0.00</div>
            </div>

            <!-- Shipping -->
            <div class="flex justify-between items-center bg-gray-50 p-5 rounded-2xl">
                <span class="font-medium">Shipping Materials</span>
                <span class="font-semibold">$5.00</span>
            </div>

            <!-- Finish Options -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-3">Finish Options</label>
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">PRIMER</label>
                        <select id="primer" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-blue-500">
                            <option value="0">No Primer - $0</option>
                            <option value="5">Small - $5</option>
                            <option value="10">Medium - $10</option>
                            <option value="20">Large - $20</option>
                            <option value="40">X-Large - $40</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">PAINT (includes Primer)</label>
                        <select id="paint" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-blue-500">
                            <option value="0">No Paint - $0</option>
                            <option value="10">Small - $10</option>
                            <option value="30">Medium - $30</option>
                            <option value="60">Large - $60</option>
                            <option value="110">X-Large - $110</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Final Price + Save -->
            <div class="pt-6 border-t">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <div class="uppercase tracking-widest text-xs text-gray-500">FINAL PRICE</div>
                        <div id="total" class="text-6xl font-bold text-gray-900">$0.00</div>
                    </div>
                    <button onclick="saveQuote()"
                            class="px-8 py-4 bg-green-600 hover:bg-green-700 text-white rounded-2xl font-semibold transition">
                        Save Quote
                    </button>
                </div>
            </div>
        </div>

        <!-- Saved Quotes -->
        <div class="border-t bg-gray-50 p-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-semibold text-lg">Saved Quotes</h2>
                <div class="flex gap-3 flex-wrap">
                    <button onclick="downloadBackup()"
                            class="text-sm px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl">
                        Download Backup
                    </button>
                    <button id="bulkEditBtn" onclick="toggleBulkEdit()"
                            class="text-sm px-5 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-xl">
                        Bulk Edit
                    </button>
                </div>
            </div>
            <div id="status" class="text-xs mb-2"></div>
            <div id="history" class="text-sm max-h-96 overflow-auto"></div>
        </div>
    </div>

<script>
let quotes = [];
let bulkEditMode = false;
let plateCount = 0;

// Parse d.h.mm or h.mm into decimal hours
function parseHours(val) {
    var str = String(val).trim();
    var parts = str.split('.');
    if (parts.length >= 3) {
        var days = parseInt(parts[0]) || 0;
        var hrs  = parseInt(parts[1]) || 0;
        var mins = parseInt(parts[2].padEnd(2,'0').substring(0,2)) || 0;
        return (days * 24) + hrs + (mins / 60);
    } else if (parts.length === 2) {
        var hrs = parseInt(parts[0]) || 0;
        var mins = parseInt(parts[1].padEnd(2,'0').substring(0,2)) || 0;
        return hrs + (mins / 60);
    } else {
        return parseInt(parts[0]) || 0;
    }
}

function addPlate(grams, hours) {
    plateCount++;
    const id = plateCount;
    const g = (grams !== undefined) ? grams : '';
    const h = (hours !== undefined) ? hours : '';
    const container = document.getElementById('plates-container');
    const div = document.createElement('div');
    div.id = 'plate-' + id;
    div.className = 'grid grid-cols-2 gap-4 p-4 bg-gray-50 rounded-2xl relative';
    div.innerHTML =
        '<div>' +
            '<label class="block text-xs text-gray-500 mb-1">PLATE ' + id + ' — Filament (g)</label>' +
            '<input type="number" min="0" step="0.01" value="' + g + '" placeholder="e.g. 55.58" class="plate-grams w-full px-3 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">' +
        '</div>' +
        '<div>' +
            '<label class="block text-xs text-gray-500 mb-1">PLATE ' + id + ' — Print Time (h.mm)</label>' +
            '<input type="text" value="' + h + '" placeholder="e.g. 2.13 or 2.7.23" class="plate-hours w-full px-3 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">' +
            '<p class="text-xs text-gray-400 mt-1">h.mm or d.h.mm (2.7.23 = 2d 7hr 23min)</p>' +
        '</div>' +
        (id > 1 ? '<button onclick="removePlate(' + id + ')" class="absolute top-2 right-3 text-red-400 hover:text-red-600 text-lg font-bold leading-none">&#x2715;</button>' : '');
    div.querySelectorAll('input').forEach(function(inp) { inp.addEventListener('input', calculatePrice); });
    container.appendChild(div);
    calculatePrice();
}

function removePlate(id) {
    var el = document.getElementById('plate-' + id);
    if (el) el.remove();
    // Relabel
    var plates = document.querySelectorAll('#plates-container > div');
    plates.forEach(function(div, i) {
        div.querySelectorAll('label').forEach(function(lbl) {
            lbl.textContent = lbl.textContent.replace(/PLATE \d+/, 'PLATE ' + (i + 1));
        });
    });
    calculatePrice();
}

function getPlateData() {
    var totalGrams = 0, totalTimeHrs = 0, plates = [];
    document.querySelectorAll('#plates-container > div').forEach(function(div) {
        var g = parseFloat(div.querySelector('.plate-grams').value) || 0;
        var hRaw = parseFloat(div.querySelector('.plate-hours').value) || 0;
        var h = parseHours(hRaw);
        totalGrams += g;
        totalTimeHrs += h;
        plates.push({ grams: g, hoursRaw: hRaw });
    });
    return { totalGrams: totalGrams, totalTimeHrs: totalTimeHrs, plates: plates };
}

function calculatePrice() {
    var data = getPlateData();
    var primerEl = document.getElementById('primer');
    var paintEl = document.getElementById('paint');
    var paintVal = parseFloat(paintEl.value) || 0;

    if (paintVal > 0) {
        primerEl.value = '0';
        primerEl.disabled = true;
    } else {
        primerEl.disabled = false;
    }

    var primerVal = parseFloat(primerEl.value) || 0;
    var filamentCost = data.totalGrams * 0.02;
    var timeCost = data.totalTimeHrs * 0.70;
    var subtotal = filamentCost + timeCost;
    var markup = subtotal * 2.5;
    var shipping = 5;
    var finishCost = paintVal > 0 ? paintVal : primerVal;
    var total = markup + shipping + finishCost;

    document.getElementById('filament-display').textContent = '$' + filamentCost.toFixed(2);
    document.getElementById('time-display').textContent = '$' + timeCost.toFixed(2);
    document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
    document.getElementById('markup-display').textContent = '$' + markup.toFixed(2);
    document.getElementById('total').textContent = '$' + total.toFixed(2);
}

function setStatus(msg, isError) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.className = isError ? 'text-xs text-red-500 mb-2' : 'text-xs text-green-600 mb-2';
    if (msg) setTimeout(function() { el.textContent = ''; }, 3000);
}

async function apiFetch(url, options) {
    options = options || {};
    options.headers = { 'Content-Type': 'application/json' };
    var res = await fetch(url, options);
    if (!res.ok) throw new Error(await res.text());
    return res.json();
}

async function loadQuotes() {
    try {
        quotes = await apiFetch('/api/quotes');
        renderHistory();
    } catch(e) {
        setStatus('Could not reach server.', true);
    }
}

async function saveQuote() {
    var product = document.getElementById('product').value.trim() || 'Unnamed Product';
    var primerVal = parseFloat(document.getElementById('primer').value) || 0;
    var paintVal = parseFloat(document.getElementById('paint').value) || 0;
    var data = getPlateData();

    var filamentCost = data.totalGrams * 0.02;
    var timeCost = data.totalTimeHrs * 0.70;
    var subtotal = filamentCost + timeCost;
    var markup = subtotal * 2.5;
    var shipping = 5;
    var finishCost = paintVal > 0 ? paintVal : primerVal;

    var newQuote = {
        date: new Date().toLocaleDateString('en-US'),
        product: product,
        plainCost: (markup + shipping).toFixed(2),
        primerCost: (markup + shipping + primerVal).toFixed(2),
        paintCost: (markup + shipping + paintVal).toFixed(2),
        grams: data.totalGrams,
        hours: data.plates[0] ? data.plates[0].hoursRaw : 0,
        primerVal: primerVal,
        paintVal: paintVal,
        plates: JSON.stringify(data.plates)
    };

    try {
        var result = await apiFetch('/api/quotes', { method: 'POST', body: JSON.stringify(newQuote) });
        newQuote.id = result.id;
        quotes.unshift(newQuote);
        renderHistory();
        setStatus('Quote saved.');
    } catch(e) {
        setStatus('Failed to save: ' + e.message, true);
    }
}

function editQuote(index) {
    var q = quotes[index];
    document.getElementById('product').value = q.product;
    document.getElementById('primer').value = q.primerVal || 0;
    document.getElementById('paint').value = q.paintVal || 0;
    document.getElementById('plates-container').innerHTML = '';
    plateCount = 0;
    var plates = [];
    try { plates = JSON.parse(q.plates || '[]'); } catch(e) {}
    if (plates.length > 0) {
        plates.forEach(function(p) { addPlate(p.grams, p.hoursRaw); });
    } else {
        addPlate(q.grams || 0, q.hours || 0);
    }
    calculatePrice();
    window.scrollTo(0, 0);
}

async function deleteQuote(index) {
    if (!confirm('Delete this quote?')) return;
    var q = quotes[index];
    try {
        await apiFetch('/api/quotes/' + q.id, { method: 'DELETE' });
        quotes.splice(index, 1);
        renderHistory();
        setStatus('Quote deleted.');
    } catch(e) {
        setStatus('Failed to delete: ' + e.message, true);
    }
}

function toggleBulkEdit() {
    bulkEditMode = true;
    document.getElementById('bulkEditBtn').textContent = 'Editing...';
    document.getElementById('bulkEditBtn').disabled = true;
    renderHistory();
}

function cancelBulkEdit() {
    bulkEditMode = false;
    document.getElementById('bulkEditBtn').textContent = 'Bulk Edit';
    document.getElementById('bulkEditBtn').disabled = false;
    loadQuotes();
}

async function saveBulkEdits() {
    document.querySelectorAll('#history tbody tr[data-index]').forEach(function(row) {
        var i = parseInt(row.dataset.index);
        row.querySelectorAll('input[data-field]').forEach(function(input) {
            quotes[i][input.dataset.field] = input.value.trim();
        });
    });
    try {
        await apiFetch('/api/quotes/bulk', { method: 'PUT', body: JSON.stringify(quotes) });
        bulkEditMode = false;
        document.getElementById('bulkEditBtn').textContent = 'Bulk Edit';
        document.getElementById('bulkEditBtn').disabled = false;
        renderHistory();
        setStatus('All changes saved.');
    } catch(e) {
        setStatus('Failed to save: ' + e.message, true);
    }
}

async function deleteBulkRow(index) {
    var q = quotes[index];
    if (q.id) {
        try {
            await apiFetch('/api/quotes/' + q.id, { method: 'DELETE' });
        } catch(e) {
            setStatus('Failed to delete: ' + e.message, true);
            return;
        }
    }
    quotes.splice(index, 1);
    renderHistory();
}

function downloadBackup() {
    if (quotes.length === 0) { alert('No quotes to export.'); return; }
    var today = new Date();
    var dateStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
    var data = quotes.map(function(q) {
        return { Date: q.date, Product: q.product, 'Plain Cost': q.plainCost, 'Primer Cost': q.primerCost, 'Paint Cost': q.paintCost };
    });
    var ws = XLSX.utils.json_to_sheet(data);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'FDM Quotes');
    XLSX.writeFile(wb, 'FDM_Print_Prices_' + dateStr + '.xlsx');
}

function renderHistory() {
    var container = document.getElementById('history');
    var cc = 'border border-gray-300 rounded px-1 py-1 w-full focus:outline-none focus:ring-1 focus:ring-purple-400';

    if (bulkEditMode) {
        var html = '<div class="mb-3 flex gap-2">' +
            '<button onclick="saveBulkEdits()" class="text-sm px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-xl font-semibold">Save All Changes</button>' +
            '<button onclick="cancelBulkEdit()" class="text-sm px-4 py-2 bg-gray-400 hover:bg-gray-500 text-white rounded-xl">Cancel</button>' +
            '</div>';
        if (quotes.length === 0) {
            html += '<p class="text-gray-400 italic">No quotes remaining.</p>';
        } else {
            html += '<div class="overflow-x-auto"><table class="w-full text-xs"><thead><tr class="border-b bg-white">' +
                '<th class="py-2 text-left pr-2">Date</th><th class="py-2 text-left pr-2">Product</th>' +
                '<th class="py-2 text-right pr-2">Plain ($)</th><th class="py-2 text-right pr-2">+Primer ($)</th>' +
                '<th class="py-2 text-right pr-2">+Paint ($)</th><th class="py-2 w-12"></th>' +
                '</tr></thead><tbody>';
            quotes.forEach(function(q, i) {
                var sp = q.product.replace(/"/g, '&quot;');
                html += '<tr class="border-b hover:bg-purple-50" data-index="' + i + '">' +
                    '<td class="py-1 pr-2"><input class="' + cc + '" data-field="date" value="' + q.date + '"></td>' +
                    '<td class="py-1 pr-2"><input class="' + cc + '" data-field="product" value="' + sp + '"></td>' +
                    '<td class="py-1 pr-2"><input class="' + cc + ' text-right" data-field="plainCost" value="' + q.plainCost + '"></td>' +
                    '<td class="py-1 pr-2"><input class="' + cc + ' text-right" data-field="primerCost" value="' + q.primerCost + '"></td>' +
                    '<td class="py-1 pr-2"><input class="' + cc + ' text-right" data-field="paintCost" value="' + q.paintCost + '"></td>' +
                    '<td class="py-1 text-center"><button onclick="deleteBulkRow(' + i + ')" class="text-red-500 hover:text-red-700 font-bold">&#x2715;</button></td>' +
                    '</tr>';
            });
            html += '</tbody></table></div>';
        }
        container.innerHTML = html;
        return;
    }

    if (quotes.length === 0) {
        container.innerHTML = '<p class="text-gray-400 italic">No quotes saved yet.</p>';
        return;
    }
    var html = '<table class="w-full"><thead><tr class="border-b bg-white">' +
        '<th class="py-3 text-left">Date</th><th class="py-3 text-left">Product</th>' +
        '<th class="py-3 text-right">Plain</th><th class="py-3 text-right">+Primer</th>' +
        '<th class="py-3 text-right">+Paint</th><th class="py-3 w-24"></th>' +
        '</tr></thead><tbody>';
    quotes.forEach(function(q, i) {
        html += '<tr class="border-b hover:bg-gray-50">' +
            '<td class="py-3">' + q.date + '</td>' +
            '<td class="py-3 font-medium">' + q.product + '</td>' +
            '<td class="py-3 text-right">' + q.plainCost + '</td>' +
            '<td class="py-3 text-right">' + q.primerCost + '</td>' +
            '<td class="py-3 text-right">' + q.paintCost + '</td>' +
            '<td class="py-3 text-center">' +
                '<button onclick="editQuote(' + i + ')" class="text-blue-600 hover:text-blue-800 text-xs mr-2">Edit</button>' +
                '<button onclick="deleteQuote(' + i + ')" class="text-red-600 hover:text-red-800 text-xs">Delete</button>' +
            '</td></tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
}

window.onload = function() {
    addPlate();
    document.getElementById('primer').addEventListener('input', calculatePrice);
    document.getElementById('paint').addEventListener('input', calculatePrice);
    document.getElementById('product').addEventListener('input', calculatePrice);
    calculatePrice();
    loadQuotes();
};
</script>
</body>
</html>
